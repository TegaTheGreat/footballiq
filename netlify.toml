[build]
  command = "npm run build"
  publish = "dist"

[functions]
  included_files = ["netlify/functions/**"]
  external_node_modules = ["node-fetch"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
